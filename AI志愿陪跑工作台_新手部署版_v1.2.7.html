function humanValue(v){
  if(v===null||v===undefined||v==='')return '';
  if(typeof v==='string'||typeof v==='number'||typeof v==='boolean')return cleanText(v);
  if(Array.isArray(v))return v.map(humanValue).filter(Boolean).join('；');
  if(typeof v==='object'){
    const keys=['value','text','plain','summary','result','title','item','question','answer','impact','use','why','reason','desc','suggestion','status','source','check','reliability','range','level','type','count','name'];
    const parts=[];
    keys.forEach(k=>{if(v[k]!==undefined&&v[k]!==null&&v[k]!=='')parts.push(humanValue(v[k]));});
    if(parts.length)return parts.join('；');
    return Object.entries(v).map(([k,val])=>`${cnKey(k)}：${humanValue(val)}`).filter(Boolean).join('；');
  }
  return cleanText(v);
}

    .replace(/currentPlanYear\s*[=:]\s*\d{4}[，,；;、\s]*/gi,'')

function analysisDataBrief(r){

  const text=parts.join('；').replace(/；{2,}/g,'；');

function getDeep(obj,path){return String(path||'').split('.').reduce((o,k)=>o&&o[k]!==undefined?o[k]:undefined,obj);}
function firstNonEmpty(){for(const v of arguments){if(v===undefined||v===null)continue;if(Array.isArray(v)&&!v.length)continue;if(typeof v==='string'&&!v.trim())continue;if(typeof v==='object'&&!Array.isArray(v)&&!Object.keys(v).length)continue;return v;}return undefined;}
function toArray(v){
  if(v===undefined||v===null||v==='')return [];
  if(Array.isArray(v))return v;
  if(typeof v==='string')return v.split(/\n|；|;/).map(x=>x.trim()).filter(Boolean);
  if(typeof v==='object'){
    const vals=Object.values(v);
    if(vals.some(Array.isArray))return vals.flatMap(toArray);
    return Object.entries(v).map(([k,val])=>({item:k,impact:val,question:k,reason:val}));
  }
  return [v];
}

  const s=firstNonEmpty(x.suggestion,x.advice,x.nextAction,x.check,x.建议,x.下一步);

function candidateStats(){const rows=state.candidates||[];let complete=0,needs=0,plan=0;rows.forEach(c=>{if(c.schoolName&&c.groupCode&&c.majorName&&(c.scoreRank2025||c.scoreRank2024||c.scoreRank2023)&&c.plan2026&&c.source)complete++;if(c.plan2026)plan++;needs+=candidateIssues(c).length;});return {total:rows.length,complete,plan,needs};}
function candidateIssues(c){const m=[];if(!c.schoolName)m.push('院校名称');if(!c.groupCode)m.push('专业组');if(!c.majorName)m.push('专业名称');if(!c.plan2026)m.push('今年招生人数');if(!(c.scoreRank2025||c.scoreRank2024||c.scoreRank2023))m.push('往年分数/位次');if(!c.tuition)m.push('学费');if(!c.campus)m.push('校区');return m;}
function collectGlobalIssues(){let out=[];(state.preferences.review?.items||[]).forEach(x=>{if(!['已处理','已核查并确认','不适用'].includes(x.status))out.push({from:'偏好',level:x.type||'待确认',text:x.question||x.item||'偏好待确认'});});(state.rules.checkItems||[]).forEach(x=>{const r=typeof x==='string'?{item:x,status:'暂未核查'}:x;if(!['已核查并确认','已确认','不适用'].includes(r.status))out.push({from:'规则',level:r.type||'待核查',text:r.item||r.question||'规则待核查'});});(state.candidates||[]).forEach((c,i)=>{const miss=candidateIssues(c);if(miss.length)out.push({from:'候选库',level:'待补充',text:`第${i+1}行缺：${miss.join('、')}`});});(state.risks.rows||[]).forEach(r=>{if(!['已确认','不适用'].includes(r.status))out.push({from:'风险',level:r.level||r.status||'待处理',text:r.item||r.desc||'风险待处理'});});(state.draft.rows||[]).forEach((r,i)=>{if(['需本人确认','需官方核查','你要确认能不能接受','提交前查官方'].includes(r.status))out.push({from:'草案',level:r.status,text:`第${i+1}项 ${r.name||''}`});});return out;}
function hasAny(obj,keys){return keys.some(k=>String(obj?.[k]??'').trim());}
function pageStatus(id){
  if(id==='01'){
    const keys=['province','year','subject','score','rank','batch'];
    return keys.every(k=>String(state.profile?.[k]??'').trim())?'done':(hasAny(state.profile,keys)?'warn':'wait');
  }
  if(id==='02'){
    const items=state.preferences.review?.items||[];
    if(items.some(x=>!['已处理','已核查并确认','不适用'].includes(x.status)))return 'warn';
    return hasAny(state.preferences,['wantedMajors','rejectedMajors','cities','rejectedCities','tuitionLimit','notes'])?'done':'wait';
  }
  if(id==='03'){
    const core=state.rules.volunteerUnit&&state.rules.filingMode;
    return core?'done':(hasAny(state.rules,['raw','sourceName','volunteerUnit','filingMode','adjustRule','subjectRule'])?'warn':'wait');
  }
  if(id==='04A'){
    if(state.rank.estimate?.readyFor04B)return 'done';
    const hasRankData=(state.rank.currentYearRows||[]).length||(state.rank.historyRefRows||[]).length||state.rank.cleaned;
    return hasRankData?'warn':'wait';
  }
  if(id==='04B'){
    if(state.rangePlan.result?.suggested||state.rangePlan.result?.readyList?.length)return 'done';
    return state.rank.estimate?.readyFor04B?'warn':'wait';
  }
  if(id==='05'){
    if(!state.candidates.length)return 'wait';
    return candidateStats().needs?'warn':'done';
  }
  if(id==='06'){
    if((state.analysis.rows||[]).length)return 'done';
    return state.candidates.length?'warn':'wait';
  }
  if(id==='07'){
    if(!(state.analysis.rows||[]).length)return 'wait';
    return (state.layering.rows||[]).length?'done':'warn';
  }
  if(id==='08'){
    if(!(state.layering.rows||[]).length)return 'wait';
    if((state.risks.rows||[]).some(r=>!['已确认','不适用'].includes(r.status)))return 'risk';
    return (state.risks.rows||[]).length?'done':'warn';
  }
  if(id==='09'){
    if(!(state.draft.rows||[]).length)return 'wait';
    return (state.draft.rows||[]).some(r=>['需本人确认','需官方核查','暂不放入'].includes(r.status))?'warn':'done';
  }
  if(id==='10'){
    if(!(state.draft.rows||[]).length && !(state.finalVersion.rows||[]).length)return 'wait';
    return Object.values(state.finalCheck||{}).every(Boolean)?'done':'warn';
  }
  return 'wait';
}
function statusText(id){
  const s=pageStatus(id);
  if(s==='done')return '完成';
  if(s==='risk')return '待查';
  if(s==='wait')return '未开始';
  return ({'01':'需补','02':'需确认','03':'需核对','04A':'待估算','04B':'待生成','05':'需补','06':'待分析','07':'待分层','08':'待检查','09':'需确认','10':'需核对'}[id]||'需确认');
}

function aiObj(stepId,task){return state.ai?.[stepId+'_'+task]||{};}
function aiDone(stepId,task){const a=aiObj(stepId,task);return !!(a.parsed&&a.parsed.stepId===stepId&&a.parsed.task===task);}
function aiStarted(stepId,task){const a=aiObj(stepId,task);return !!(a.showAnswer||a.input||a.error||a.parsed);}
function currentMiniIndex(id){
  if(pageStatus(id)==='done')return miniSteps(id).length||1;
  if(id==='01')return hasAny(state.profile,['province','year','subject','score','rank','batch'])?2:1;
  if(id==='02'){if(!hasAny(state.preferences,['wantedMajors','rejectedMajors','cities','rejectedCities','tuitionLimit','notes']))return 1;if(aiDone('02','preference_review'))return 5;if(aiStarted('02','preference_review'))return 3;return 2;}
  if(id==='03'){if(!String(state.rules.raw||'').trim())return 1;if(aiDone('03','rule_extract'))return 5;if(aiStarted('03','rule_extract'))return 3;return 2;}
  if(id==='04A'){const hasRows=(state.rank.currentYearRows||[]).some(r=>hasAny(r,['score','rank','segment','highRank','lowRank']))||(state.rank.historyRefRows||[]).some(r=>hasAny(r,['year','score','lowRank','note']));if(state.rank.estimate?.readyFor04B)return 5;if(!hasRows&&!state.rank.cleaned)return 1;if(!state.rank.cleaned)return 2;if(aiStarted('04A','rank_estimate'))return 3;return 2;}
  if(id==='04B'){if(state.rangePlan.result?.suggested||state.rangePlan.result?.readyList?.length)return 5;if(aiStarted('04B','range_generate'))return 3;return state.rank.estimate?.readyFor04B?2:1;}
  if(id==='05'){if(!state.candidates.length)return 1;if(candidateStats().needs)return 3;if((state.candidateCheck?.issues||[]).length)return 5;if(aiStarted('05','candidate_clean'))return 4;return 4;}
  if(id==='06'){if((state.analysis.rows||[]).length)return 5;if(!state.candidates.length)return 1;if(aiStarted('06','rank_analysis'))return 3;return 2;}
  if(id==='07'){if((state.layering.rows||[]).length)return 5;if(!(state.analysis.rows||[]).length)return 1;if(aiStarted('07','layering'))return 3;return 2;}
  if(id==='08'){if((state.risks.rows||[]).length)return 5;if(!(state.layering.rows||[]).length)return 1;if(aiStarted('08','risk_review'))return 3;return 2;}
  if(id==='09'){if((state.draft.rows||[]).length)return 5;if(!(state.layering.rows||[]).length)return 1;if(aiStarted('09','draft'))return 3;return 2;}
  if(id==='10'){if(!(state.draft.rows||[]).length&&!(state.finalVersion.rows||[]).length)return 1;if(!Object.values(state.finalCheck||{}).every(Boolean))return 2;if(!(state.finalVersion.rows||[]).length)return 3;return 5;}
  return 1;
}

function stepGuide(id){const p=pages.find(x=>x.id===id);const steps=miniSteps(id);const cur=currentMiniIndex(id);const n=nextPage(id);return `<div class="step-guide"><div class="step-guide-head"><b>${stepFullName(id)}</b><span>${introFor(id)}</span></div><div class="micro-flow">${steps.map((s,i)=>`<span class="micro-step ${i+1<cur?'done':''} ${i+1===cur?'active':''}">${esc(s)}</span>`).join('')}</div><div class="current-action"><span><b>现在该做：</b>${esc(currentActionText(id))}</span>${n?`<span class="next-chip">下一步：第${n.id}步｜${n.name}</span>`:`<span class="next-chip">最后一步：导出报告</span>`}</div></div>`;}
function renderPageShell(id,body){const p=pages.find(x=>x.id===id);return `<main>${renderTopbar()}<section class="page"><div class="page-head"><div class="crumb">${stepFullName(id)}</div><h2>${p.name}</h2></div>${stepGuide(id)}${simpleTip(id)}${body}<div class="section flat"><div class="save-next-title"><h3>保存并继续</h3><small>做完本页就看这里</small></div><div class="actions"><button class="primary" onclick="saveState();toast('已保存第${id}步')">保存第${id}步</button>${nextButton(id)}<button class="danger" onclick="confirmClearCurrentPage()">只清空第${id}步</button></div></div></section></main>`;}
function simpleTip(id){const tips={'01':'照成绩查询页填。没有的信息先空着。','02':'只写真实想法，不用写得高级。','03':'复制官方规则原文。看不懂也没关系。','04A':'先填今年一分一段，再按当前位次找往年参考。不会填就空着。','04B':'不用自己算范围，点按钮让 AI 生成第05步要找的资料清单。','05':'先把候选放进表。红星列优先补；查不到写待确认。','06':'数据不全很正常。第06步只判断够不够继续看，不要求补成完美表。','07':'第07步只看冲稳保垫结构；数据不太全的先留着看看，不用逐条处理。真正要不要放进草案，到第09步再说。','08':'第08步默认只看大风险。普通提醒已记录，不用每条都点；明显踩底线的再处理。','09':'第09步才把前面的风险汇总成草案状态：可讨论、需本人确认、需官方核查、暂不放入。','10':'最后一定对照官方系统。'};return `<details class="compact-help"><summary>不会填？点这里看一句提示</summary><div>${tips[id]||'按提示填。'}</div></details>`;}
function nextButton(id){const idx=pages.findIndex(p=>p.id===id);if(idx<0||idx===pages.length-1)return `<button class="primary next-full" onclick="exportReport(true)">导出考生报告</button>`;const n=pages[idx+1];return `<button class="next-full" onclick="route('${n.id}')">进入第${n.id}步｜${n.name}</button>`;}
function renderHome(){return `<main><div class="home"><div class="hero"><h1>不懂志愿，也能一步一步整理</h1><p>先填资料，再让 AI 帮你检查。不会填的地方写“待确认”。最后一定回到官方系统核对。</p><div class="actions"><button class="primary" onclick="route('01')">从第01步开始</button><button onclick="route('05')">跳到第05步｜导入候选</button><button onclick="route('08')">跳到第08步｜先查风险</button><button onclick="loadDemoData()">载入演示数据</button></div></div><div class="section"><h3>使用前先看一眼</h3><div class="notice gold"><b>先说清楚：</b>这个工具不是“自动推荐大学神器”，也不保证录取。它负责把资料、候选、风险和草案整理清楚；最终填报必须以省考试院正式系统、当年招生计划和高校招生章程为准。</div><div class="howto-grid"><div class="howto-card"><b><span class="howto-num">1</span>网页做什么</b>保存你的信息，生成提示词，整理候选表、风险清单和最终核对表。</div><div class="howto-card"><b><span class="howto-num">2</span>AI做什么</b>帮你看资料够不够、位次是否合适、哪里有风险。不替你拍板。</div><div class="howto-card"><b><span class="howto-num">3</span>你要准备什么</b>成绩位次、省份规则、一分一段表、候选院校专业组数据。查不到就写“待确认”。</div><div class="howto-card"><b><span class="howto-num">4</span>看到待确认怎么办</b>不是报错，是提醒你还没查实。先标着，后面补；别让 AI 现场编，容易翻车。</div></div></div><div class="home-grid"><div class="home-card"><h3>你不用会专业术语</h3><p>网页会告诉你填什么。看不懂就写“待确认”。</p></div><div class="home-card"><h3>不要一次喂太多</h3><p>候选很多时，后面会按50条一批给AI看，少一点混乱，多一点靠谱。</p></div><div class="home-card"><h3>最后得到什么</h3><p>候选表、风险清单、参考草案、最终核对表。</p></div></div><div class="section"><h3>整体流程</h3><div class="simple-flow"><div class="flow-mini"><b>1 建档</b>填考生信息</div><div class="flow-mini"><b>2 看位置</b>估位次</div><div class="flow-mini"><b>3 放候选</b>做候选表</div><div class="flow-mini"><b>4 查风险</b>看能不能接受</div><div class="flow-mini"><b>5 做草案</b>最后核对</div></div></div></div></main>`;}
function render01(){return renderPageShell('01',`<div class="section"><h3>照成绩页填写 <span class="input-only-note">只填白色框</span></h3><div class="notice"><b>科类/选科怎么填：</b>成绩页写“历史类”就填历史类；写“物理类”就填物理类；老高考可以写文科或理科。</div><div class="grid cols3">${input('profile.province','省份','例：江西')}${input('profile.year','年份','例：2026')}${input('profile.subject','科类/选科','例：历史类')}${input('profile.score','分数','例：576')}${input('profile.rank','全省位次','例：4960')}${input('profile.batch','批次','例：本科批')}</div><div class="grid cols2" style="margin-top:13px">${select('profile.scoreSource','分数来源',['','成绩查询页','一分一段表','手动填写','暂不确定'])}${textarea('profile.special','特殊情况','例：不接受高学费；身体条件需核查；没有就写无')}</div></div>`);}
function render02(){return renderPageShell('02',`<div class="section flat"><h3>先了解自己，再写偏好</h3><div class="notice"><b>先别急着选专业。</b>这一步是让 AI 像升学规划老师一样，帮你聊清楚：你适合什么、在意什么、不能接受什么。聊完后，让 AI 在最后整理一段“可回填到网页第02步的最终偏好”，你再回来填下面的表。</div><div class="actions"><button class="primary" onclick="generatePrompt('02','major_intro','full')">可选：复制第02-0步｜自我探索提示词</button></div><div class="notice gold"><b>这一步不用粘贴 AI 回答。</b>你只要和自己的 AI 多聊一轮，想清楚后回来填表。后续步骤会按下面表格继续分析，所以尽量写清楚，别只写“都可以”“看情况”“好一点的城市”。下面的“AI检查偏好”才需要粘贴回来保存。</div></div><div class="section"><h3>写真实想法</h3><div class="notice"><b>不用写得高级。</b>把聊完后真正想保留、不能接受、还拿不准的内容写下来。拿不准就写“待确认”。这张表就是后续筛候选、查风险、做草案时优先引用的偏好依据。</div><div class="grid cols2">${textarea('preferences.wantedMajors','想学的专业','例：汉语言文学、新闻传播、教育学')}${textarea('preferences.rejectedMajors','不能接受的专业','例：医学类、理工科类、高强度数学类专业')}${textarea('preferences.cities','想去的城市/地区','例：长三角、珠三角、省会城市、经济发达地区')}${textarea('preferences.rejectedCities','不能接受的城市/地区','例：太偏远、交通不方便')}${textarea('preferences.tuitionLimit','学费底线','例：不优先考虑高学费中外合作')}${textarea('preferences.notes','其他想法','例：希望就业面不要太窄；还不确定是否接受调剂')}</div></div>${aiPanel('02','让 AI 检查偏好有没有矛盾','preference_review')}${renderPreferenceFeedback()}${renderReviewItems()}${renderPreferenceImpact()}`);}
function renderMajorIntro(){return '';}
function renderPreferenceFeedback(){const fb=state.preferences.review?.pageFeedback||{};const summary=state.preferences.review?.summary||'';if(!fb.resultTitle&&!toArray(fb.resultBullets).length&&!fb.nextAction&&!summary)return '';return `<div class="section"><h3>AI检查结果</h3>${pageFeedbackBox(fb,summary)}</div>`;}
function renderPreferenceImpact(){let rows=state.preferences.review?.impact||[];if(!rows.length&&state.preferences.review?.summary)rows=derivePreferenceImpact();if(!rows.length)return '';rows=rows.map(normalizeImpactItem).filter(r=>r.item||r.impact);return `<div class="section"><h3>这些偏好后面会用到</h3><div class="table-wrap"><table class="table"><tr><th>你确认了什么</th><th>后面怎么用</th></tr>${rows.map(r=>`<tr><td>${esc(r.item||'AI提醒')}</td><td>${esc(r.impact||'后续筛选和风险复核会参考。')}</td></tr>`).join('')}</table></div></div>`;}
function renderReviewItems(){const rows=(state.preferences.review?.items||[]).map(normalizeReviewItem).filter(r=>r.question);if(!rows.length)return '';return `<div class="section"><h3>AI提出的问题</h3><div class="notice"><b>这里不是让你一次全想明白。</b>先处理最重要的问题；不确定的可以保持“待处理”，后面风险复核还会提醒。</div><div class="table-wrap"><table class="table"><tr><th>问题</th><th>为什么问</th><th>状态</th><th>你的回答</th></tr>${rows.map((r,i)=>`<tr><td>${esc(r.question||'')}</td><td>${esc(r.reason||r.suggestion||'帮助后面筛选')}</td><td><select onchange="state.preferences.review.items[${i}].status=this.value;saveState();render()">${['待处理','已处理','暂时跳过'].map(x=>`<option ${r.status===x?'selected':''}>${x}</option>`).join('')}</select></td><td><input value="${esc(r.answer||'')}" placeholder="例：专业优先" oninput="state.preferences.review.items[${i}].answer=this.value;saveState()"></td></tr>`).join('')}</table></div></div>`;}
function render03(){return renderPageShell('03',`<div class="section flat"><h3>先知道去哪里找规则</h3><div class="notice"><b>规则资料建议去这些地方找：</b>省考试院官网、招生计划书、正式志愿填报系统、高校招生网。页面不要求你反复填写来源。</div></div><div class="section"><h3>粘贴官方规则原文</h3><div class="notice"><b>你不用自己看懂政策。</b>把官方规则复制进来，让 AI 解释：能填几个、每格是什么、调剂到哪里、哪些不能填。</div>${textarea('rules.raw','官方规则原文','例：本科批实行院校专业组平行志愿……',true)}</div>${aiPanel('03','让 AI 解释本省规则','rule_extract')}<div class="section"><h3>必须了解的本省规则</h3>${ruleExplainCards()}${ruleSummary()}</div>${checkItemsTable()}`);}
function ruleExplainCards(){const rows=state.rules.ruleExplanations||[];if(!rows.length)return `<div class="notice gold">AI保存后，这里会显示规则解释。重点看：能填几个、每格是什么、调剂到哪里、哪些情况不能填。</div>`;return `<div class="explain-grid">${rows.map(r=>`<div class="explain-card"><b>${esc(r.rulePoint||r.title||'规则')}</b>${esc(r.plain||r.explain||'')}<br><span class="section-note">影响：${esc(r.impact||'待确认')}</span></div>`).join('')}</div>`;}
function ruleSummary(){const rows=[['能填几个志愿',state.rules.volunteerCount,'决定候选表要准备多少，不要只准备几个学校。'],['每个志愿格子是什么',state.rules.volunteerUnit,'如果是“院校专业组”，就不能只看学校最低分。'],['投档方式',state.rules.filingMode,'影响冲稳保顺序和退档风险。'],['调剂会到哪里',state.rules.adjustRule,'决定你是否能接受组内其他专业。'],['选科要求',state.rules.subjectRule,'选科不符合，再喜欢也不能填。']];return `<div class="table-wrap"><table class="table"><tr><th>必须知道的事</th><th>AI整理结果</th><th>为什么重要</th></tr>${rows.map(r=>`<tr><td><b>${r[0]}</b></td><td>${esc(r[1]||'待生成')}</td><td>${r[2]}</td></tr>`).join('')}</table></div>`;}
function checkItemsTable(){const rows=(state.rules.checkItems||[]).map(x=>typeof x==='string'?{item:x,type:'待核查',status:'暂未核查',source:'官方文件'}:x);if(!rows.length)return '';return `<div class="section"><h3>后面还要核查的事</h3><div class="table-wrap"><table class="table"><tr><th>事项</th><th>为什么要查</th><th>状态</th></tr>${rows.map((r,i)=>`<tr><td>${esc(r.item||r.question||'')}</td><td>${esc(r.why||r.reason||r.source||'以官方系统和高校章程为准')}</td><td><select onchange="state.rules.checkItems[${i}].status=this.value;saveState();render()">${['暂未核查','已核查并确认','不适用'].map(x=>`<option ${r.status===x?'selected':''}>${x}</option>`).join('')}</select></td></tr>`).join('')}</table></div></div>`;}
function render04A(){return renderPageShell('04A',`<div class="section flat"><h3>先去哪里找一分一段表</h3><div class="notice"><b>建议先用夸克高考查一分一段表。</b>打开夸克高考，选择省份、年份、批次、科类，再进入“一分一段表”。建议直接找近3—5年的截图给自己的 AI，不用手抄整张表。</div><div class="notice gold"><b>截图范围建议：</b>每一年围绕当前位次 ${esc(state.profile.rank||'当前位次')} 前后约1000名截图或复制数据；如果数据不连续，必要时扩大到前后1500—2000名。考生档案里的年份是 ${esc(state.profile.year||'待填')}，复制提示词时会告诉 AI：这个年份是“今年”，其他年份是“往年参考”。</div><div class="actions"><button class="primary small" onclick="copyText(rankScreenshotPrompt(),'截图识别提示词已复制')">复制截图识别提示词</button></div>${rankOcrBox()}</div><div class="section"><h3>已从第01步读取</h3><div class="notice green"><b>这里不用重复填。</b>如果分数、位次或批次不对，请回第01步修改。</div><div class="read-grid"><div class="read-item"><span>分数</span><b>${esc(state.profile.score||'待填')}</b></div><div class="read-item"><span>当前位次</span><b>${esc(state.profile.rank||'待填')}</b></div><div class="read-item"><span>批次</span><b>${esc(state.profile.batch||'待填')}</b></div><div class="read-item"><span>科类/选科</span><b>${esc(state.profile.subject||'待填')}</b></div></div><div class="actions"><button class="small" onclick="route('01')">回第01步修改</button></div></div><div class="section"><h3>每年补充信息（建议填，不会就空着）</h3><div class="notice"><b>这几项不是必须。</b>如果能查到每年同科类总人数、本科批线和批次线对应位次，就填在这里；查不到不影响继续用一分一段表做基础估算。</div><div class="notice gold"><b>为什么建议填：</b>有了同科类总人数和批次线对应位次，AI 可以辅助看全体排名率和批次内位置；没有这些数据，也可以继续按“同位次附近分数段”估算。</div><div class="notice"><b>批次线对应位次怎么填：</b>通常填批次线分数对应的“累计人数/最低位次”，也就是位次数字较大的那个。位次数字越小排名越靠前，数字越大排名越靠后；查不到就空着。</div>${yearStatsRows()}</div><div class="section"><h3>今年数据：先看你现在排在哪里</h3><div class="notice"><b>找今年本省、同科类的一分一段表。</b>可以用夸克高考截图后让自己的 AI 识别，也可以手动填。填你的分数，以及上下几分。表里的“累计人数”通常可以填到“最低位次”。</div><div class="explain-grid"><div class="explain-card"><b>本段人数</b>这个分数一共有多少人。</div><div class="explain-card"><b>最高位次</b>这个分数段里排得最靠前的名次。有范围就照抄。</div><div class="explain-card"><b>最低位次</b>通常就是累计人数。只看到累计人数，就填这里。</div></div>${currentYearRows()}</div><div class="section"><h3>往年参考：看这个位次往年对应多少分</h3><div class="notice"><b>按当前位次去找。</b>以 ${esc(state.profile.rank||'当前位次')} 为中心，每一年先找前后约1000名附近的数据；如果截图里数据断了、识别不完整，再扩大到前后1500—2000名。</div><div class="notice gold"><b>推荐填近3—5年。</b>能找到近3年就先填近3年；资料方便再填近5年。可以把截图统一发给自己的 AI 识别，不需要在这里重复复制提示词。</div>${historyRefRows()}</div>${aiPanel('04A','让 AI 检查位次数据够不够','rank_clean')}${aiPanel('04A','让 AI 估算等效位次','rank_estimate',!state.rank.cleaned)}${rankFeedbackBox()}${rankEstimateBox()}`);}


function simpleNumber(v){const n=Number(String(v||'').replace(/[,，\s]/g,''));return Number.isFinite(n)?n:null;}
function pct(v){return Number.isFinite(v)?(v*100).toFixed(2)+'%':'暂不能计算';}
function findYearStat(year){year=String(year||'').replace(/[^0-9]/g,'');return (state.rank.yearStats||[]).find(r=>String(r.year||'').replace(/[^0-9]/g,'')===year)||{};}
function calcCurrentRates(){const rank=simpleNumber(state.profile.rank);const stat=findYearStat(state.profile.year);const total=simpleNumber(stat.totalCandidates);const batchRank=simpleNumber(stat.batchRank);return {rank,total,batchRank,rankingRate:rank&&total?rank/total:null,batchRatio:rank&&batchRank?rank/batchRank:null};}
function firstNonEmpty(){for(const v of arguments){if(v!==undefined&&v!==null&&String(v).trim()!=='')return v;}return '';}
function rankEstimateBox(){const e=state.rank.estimate||{};const rates=calcCurrentRates();const hasAny=e.range||e.reliability||e.conclusion||e.centerRank||e.collectionRange||e.currentPosition||e.rankingRate||e.batchRatio;const currentPos=e.currentPosition||{};const rankingRate=e.rankingRate||{};const batchRatio=e.batchRatio||{};const yearMap=toArray(e.yearMappings||e.details||[]);const rateMap=toArray(e.rateMappings||[]);const range=firstNonEmpty(e.range,'待生成');const center=firstNonEmpty(e.centerRank,e.center,'待生成');const collect=firstNonEmpty(e.collectionRange,e.suggestedCollectionRange,'待生成');const reliability=firstNonEmpty(e.reliability,'待生成');return `<div class="section"><h3>估算结果</h3>${!hasAny?`<div class="empty">还没有估算结果。保存 AI 回答后，这里会显示等效位次、排名率、批次内比例和往年对照。</div>`:''}<div class="summary-cards"><div class="metric"><span>核心等效区间</span><b>${esc(range)}</b></div><div class="metric"><span>中心参考</span><b>${esc(center)}</b></div><div class="metric"><span>建议收集范围</span><b>${esc(collect)}</b></div><div class="metric"><span>可靠程度</span><b>${esc(reliability)}</b></div></div><div class="notice"><b>这不是录取预测。</b>这里只是把今年位次换算成往年可比较的位置，用来决定下一步该收集哪些候选数据。</div><div class="section flat" style="margin-top:14px"><h3>计算过程</h3><div class="summary-cards"><div class="metric"><span>今年定位</span><b style="font-size:16px">${esc(firstNonEmpty(currentPos.positionExplanation,currentPos.scoreRankRange,e.currentPositionText,'待生成'))}</b></div><div class="metric"><span>全体排名率</span><b>${esc(firstNonEmpty(rankingRate.value,rates.rankingRate?pct(rates.rankingRate):''))}</b><small>${rates.total?'同科类总人数：'+esc(rates.total):'未填同科类总人数'}</small></div><div class="metric"><span>批次内比例</span><b>${esc(firstNonEmpty(batchRatio.value,rates.batchRatio?pct(rates.batchRatio):''))}</b><small>${rates.batchRank?'批次线对应位次：'+esc(rates.batchRank):'未填批次线对应位次'}</small></div><div class="metric"><span>同分人数</span><b>${esc(firstNonEmpty(currentPos.sameScoreCount,''))}</b><small>${esc(firstNonEmpty(currentPos.plain,currentPos.positionExplanation,'用于判断分数段是否拥挤'))}</small></div></div></div>${yearMap.length?`<div class="section flat" style="margin-top:14px"><h3>往年同位次对照</h3><div class="table-wrap"><table class="table"><tr><th>年份</th><th>对应分数</th><th>位次段</th><th>说明</th></tr>${yearMap.map(r=>`<tr><td>${esc(r.year||'')}</td><td>${esc(r.matchedScore||r.score||'')}</td><td>${esc(r.rankRange||r.rankRangeText||r.relation||'')}</td><td>${esc(r.plain||r.explain||r.relation||'')}</td></tr>`).join('')}</table></div></div>`:''}${rateMap.length?`<div class="section flat" style="margin-top:14px"><h3>排名率辅助映射</h3><div class="table-wrap"><table class="table"><tr><th>年份</th><th>全体排名率映射</th><th>批次内比例映射</th><th>说明</th></tr>${rateMap.map(r=>`<tr><td>${esc(r.year||'')}</td><td>${esc(r.rankingRateMappedRank||'未计算')}</td><td>${esc(r.batchRatioMappedRank||'未计算')}</td><td>${esc(r.plain||'')}</td></tr>`).join('')}</table></div></div>`:''}<details class="notice" style="margin-top:14px"><summary><b>这个结果怎么算出来的？</b></summary><div style="margin-top:10px;line-height:1.9">1. 先确认今年分数和位次能不能对上。<br>2. 再把当前位次放进近几年一分一段表，看每年落在哪个分数段。<br>3. 如果填了同科类总人数，就计算全体排名率；如果填了批次线对应位次，就计算批次内比例。<br>4. 排名率和批次内比例只做辅助校验，不和同位次对照机械平均。<br>5. 最后根据年份覆盖、口径差异、截图识别来源和缺失数据判断可靠程度。</div></details>${e.conclusion?`<div class="notice green" style="margin-top:14px"><b>结论：</b>${esc(e.conclusion)}</div>`:''}</div>`;}

function rankOcrBox(){return `<div style="margin-top:14px"><div class="field"><label>把自己的 AI 识别结果粘贴到这里</label><div class="field-help">建议把近3—5年的一分一段截图一起发给自己的 AI，让它整理成 JSON。提示词会带上考生档案年份，AI 会把这个年份当作“今年数据”，其他年份当作“往年参考”。粘贴后只点一个按钮即可导入。</div><textarea class="large" placeholder='例：{"rows":[{"year":"2022","province":"江西","batch":"本科","subject":"文科","score":"548","segment":"273","highRank":"7490","lowRank":"7762","note":"截图识别"}]}' oninput="state.rank.ocrText=this.value;saveState()">${esc(state.rank.ocrText||'')}</textarea></div><div class="actions"><button class="primary small" onclick="importRankOcr('auto')">导入识别结果</button><button class="small" onclick="state.rank.ocrText='';state.rank.ocrImportMessage='';saveState();render()">清空识别结果</button></div>${state.rank.ocrImportMessage?`<div class="notice green"><b>导入结果：</b>${esc(state.rank.ocrImportMessage)}</div>`:''}</div>`;}
function parseLooseJson(txt){let s=String(txt||'').trim();if(!s)throw new Error('请先粘贴 AI 识别结果');s=s.replace(/^```(?:json)?\s*/i,'').replace(/```$/,'').trim();try{return JSON.parse(s);}catch(e){}let a=s.indexOf('{'),b=s.lastIndexOf('}');if(a>=0&&b>a)return JSON.parse(s.slice(a,b+1));a=s.indexOf('[');b=s.lastIndexOf(']');if(a>=0&&b>a)return JSON.parse(s.slice(a,b+1));throw new Error('没有识别到可导入的 JSON');}
function pickVal(obj,keys){for(const k of keys){if(obj&&obj[k]!==undefined&&obj[k]!==null&&String(obj[k]).trim()!=='')return obj[k];}return '';}
function normalizeRankOcrRow(r){if(!r||typeof r!=='object')return null;let range=String(pickVal(r,['rankRange','range','位次范围','排名范围','位次','rank'])||'');let high=String(pickVal(r,['highRank','highestRank','topRank','最高位次','最高排名','起始位次'])||'');let low=String(pickVal(r,['lowRank','lowestRank','bottomRank','cumulative','最低位次','最低排名','累计人数','累计','结束位次'])||'');if((!high||!low)&&range){const m=range.match(/(\d+)\s*[-—~至到]\s*(\d+)/);if(m){high=high||m[1];low=low||m[2];}}
  const year=String(pickVal(r,['year','年份'])||'').replace(/[^0-9]/g,'');
  const score=String(pickVal(r,['score','分数'])||'').replace(/[^0-9.]/g,'');
  const segment=String(pickVal(r,['segment','sameScore','count','本段人数','同分人数','人数'])||'').replace(/[^0-9]/g,'');
  high=String(high||'').replace(/[^0-9]/g,'');low=String(low||'').replace(/[^0-9]/g,'');
  const province=pickVal(r,['province','省份']);const batch=pickVal(r,['batch','批次']);const subject=pickVal(r,['subject','科类','选科']);const note=humanValue(pickVal(r,['note','备注','说明'])||'截图识别导入');
  if(!(score||segment||high||low))return null;return {year,province,batch,subject,score,segment,highRank:high,lowRank:low,note};}
function rankRowsFromOcrText(){const obj=parseLooseJson(state.rank.ocrText||'');let rows=[];if(Array.isArray(obj))rows=obj;else rows=obj.rows||obj.data||obj.result?.rows||obj.fields?.rows||obj.currentYearRows||obj.historyRefRows||[];if(!Array.isArray(rows))throw new Error('JSON里没有 rows 数组');rows=rows.map(normalizeRankOcrRow).filter(Boolean);if(!rows.length)throw new Error('没有识别到可导入的分数/位次行');return rows;}
function upsertCurrentRankRow(row){const item={type:'截图识别',score:row.score,segment:row.segment,highRank:row.highRank,lowRank:row.lowRank,note:[row.year,row.province,row.batch,row.subject,row.note].filter(Boolean).join('；')};const idx=(state.rank.currentYearRows||[]).findIndex(x=>String(x.score)===String(item.score));if(idx>=0)state.rank.currentYearRows[idx]={...state.rank.currentYearRows[idx],...item};else state.rank.currentYearRows.push(item);}
function upsertHistoryRankRow(row){const item={year:row.year||'',rangeType:'当前位次附近',score:row.score,segment:row.segment,highRank:row.highRank,lowRank:row.lowRank,note:[row.province,row.batch,row.subject,row.note].filter(Boolean).join('；')};const idx=(state.rank.historyRefRows||[]).findIndex(x=>String(x.year)===String(item.year)&&String(x.score)===String(item.score));if(idx>=0)state.rank.historyRefRows[idx]={...state.rank.historyRefRows[idx],...item};else state.rank.historyRefRows.push(item);}
function importRankOcr(mode){try{const rows=rankRowsFromOcrText();if(!state.rank.currentYearRows)state.rank.currentYearRows=[];if(!state.rank.historyRefRows)state.rank.historyRefRows=[];let cur=0,his=0;const currentYear=String(state.profile.year||'').replace(/[^0-9]/g,'');rows.forEach(r=>{if(mode==='current'){upsertCurrentRankRow(r);cur++;return;}if(mode==='history'){upsertHistoryRankRow(r);his++;return;}if(r.year&&currentYear&&String(r.year)===currentYear){upsertCurrentRankRow(r);cur++;}else if(r.year&&currentYear&&String(r.year)!==currentYear){upsertHistoryRankRow(r);his++;}else{upsertCurrentRankRow(r);cur++;}});state.rank.ocrImportMessage=`已导入 ${rows.length} 行：今年数据 ${cur} 行，往年参考 ${his} 行。相同年份+分数会自动更新，不会重复新增。`;saveState();render();toast('识别结果已导入表格');}catch(e){state.rank.ocrImportMessage='导入失败：'+(e.message||e);saveState();render();toast('导入失败');}}

function candidateAuditSuspicious(c){
  const miss=candidateIssues(c);
  const ranks=[rankNumberFromText(c.scoreRank2025),rankNumberFromText(c.scoreRank2024),rankNumberFromText(c.scoreRank2023)].filter(n=>Number.isFinite(n)&&n>0);
  const maxRank=ranks.length?Math.max(...ranks):0;
  const minRank=ranks.length?Math.min(...ranks):0;
  const spread=(maxRank&&minRank)?maxRank-minRank:0;
  const plans=[simpleNumber(c.plan2026),simpleNumber(c.plan2025),simpleNumber(c.plan2024),simpleNumber(c.plan2023)].filter(n=>Number.isFinite(n));
  const planMax=plans.length?Math.max(...plans):0;
  const planMin=plans.length?Math.min(...plans):0;
  const t=candidateSearchText(c);
  return miss.length>0 || spread>=1500 || (planMax&&planMin&&planMax>=planMin*2) || /待确认|不清楚|模拟|口径|中外|民办|分校|专项|新增|停招|校区/.test(t);
}

function compactText(v,max=180){let t=humanValue(v||'').replace(/\s+/g,' ').trim();return t.length>max?t.slice(0,max)+'……':t;}
function issueKeyword(x){const t=humanValue(x);if(/招生人数|招生计划|人数/.test(t))return '今年招生人数';if(/最低分|位次|分\/位次|近三年|2025|2024|2023/.test(t))return '近三年分数/位次';if(/专业组|专业代码|院校代码|代码/.test(t))return '院校/专业组代码';if(/选科/.test(t))return '选科要求';if(/学费/.test(t))return '学费';if(/校区|培养地点/.test(t))return '校区';if(/来源|数据源|官方/.test(t))return '数据来源';if(/口径|批次|科类|计划类型|中外|专项|民办/.test(t))return '数据口径';if(/调剂/.test(t))return '调剂风险';if(/底线|不接受|医学|理工|数学|专业偏好/.test(t))return '偏好/底线';return '其他提醒';}
function issueActionText(k){

function extractRankNumbers(s,userRank){
  const txt=String(s||'').replace(/20[2-3]\d/g,' ');
  const nums=[];
  txt.replace(/\/\s*(\d{3,7})/g,(m,n)=>{nums.push(Number(n));return m;});
  txt.replace(/(?:位次|排名|历史线|参考|区间|范围)[^\d]{0,8}(\d{3,7})\s*[-~—至到,，/]\s*(\d{3,7})/g,(m,a,b)=>{nums.push(Number(a),Number(b));return m;});
  txt.replace(/\b(\d{3,7})\b/g,(m,n)=>{n=Number(n);if(!nums.includes(n))nums.push(n);return m;});
  return nums.filter(n=>n>0 && n!==Number(userRank) && n<1000000);

function candidateHistoryRanks(c){

}
function layerHistoryRanks(r){

  let rowNums=[];
  [r?.reason,r?.safetyRole,r?.planImpact].filter(Boolean).forEach(x=>{rowNums=rowNums.concat(extractRankNumbers(x,rank));});
  // AI 的分层理由里如果已经写了“历年位次/历史位次”，优先用它，避免拿原候选库里错位字段误判。

function layerLogicWarning(r){
  const userRank=Number(String(state.profile.rank||'').replace(/\D/g,''));
  if(!userRank)return '';
  const nums=layerHistoryRanks(r);
  if(!nums.length)return '';
  const avg=nums.reduce((a,b)=>a+b,0)/nums.length;
  const layer=String(r.layer||'');
  const hard=avg<userRank*0.94;
  const easy=avg>userRank*1.06;
  if(hard && /(稳$|稳中偏保|保|垫)/.test(layer))return `位次方向可能偏乐观：历史参考约 ${Math.round(avg)}，比考生位次 ${userRank} 更靠前，通常更偏冲。`;
  if(easy && /冲/.test(layer))return `位次方向可能分反：历史参考约 ${Math.round(avg)}，数字大于考生位次 ${userRank}，通常不该判成冲。`;
  return '';
}

return `<div class="summary-cards"><div class="metric"><span>草案项</span><b>${rows.length}</b></div><div class="metric"><span>可讨论</span><b>${included}</b></div><div class="metric"><span>需确认/核查</span><b>${need}</b></div><div class="metric"><span>下一步</span><b>第10步</b></div></div><div class="notice green"><b>草案不是最终提交表。</b>默认只看当前筛选结果；“需本人确认/需官方核查”是第09步汇总出的草案状态，不代表第07步就必须补完全部数据。正式提交前处理即可。</div>${renderBulkControlsWithCounts('draft',filters,filterCounts(rows,filters,draftFilter),'搜索草案项、层级、风险')}${viewNote('draft',filters,page.total)}<div class="table-wrap"><table class="table compact-table"><tr><th>顺序</th><th>ID</th><th>候选项</th><th>专业组</th><th>专业</th><th>层级</th><th>放入理由</th><th>风险</th><th>状态</th><th>操作</th></tr>${page.rows.map(r=>{const i=r._idx;return `<tr><td>${i+1}</td><td>${esc(r.candidateId||'')}</td><td><input value="${esc(r.name||'')}" placeholder="例：A大学" oninput="state.draft.rows[${i}].name=this.value;saveState()"></td><td><input value="${esc(r.groupCode||'')}" placeholder="例：101组" oninput="state.draft.rows[${i}].groupCode=this.value;saveState()"></td><td><input value="${esc(r.majorName||'')}" placeholder="例：法学" oninput="state.draft.rows[${i}].majorName=this.value;saveState()"></td><td><input value="${esc(r.layer||'')}" placeholder="例：稳" oninput="state.draft.rows[${i}].layer=this.value;saveState()"></td><td><input value="${esc(r.reason||'')}" placeholder="例：位次接近" oninput="state.draft.rows[${i}].reason=this.value;saveState()"></td><td><input value="${esc(r.risk||'')}" placeholder="例：校区待确认" oninput="state.draft.rows[${i}].risk=this.value;saveState()"></td><td><select onchange="state.draft.rows[${i}].status=this.value;saveState();render()">${['可以先放草案','你要确认能不能接受','提交前查官方','暂不放入'].map(x=>`<option ${r.status===x?'selected':''}>${x}</option>`).join('')}</select></td><td><button class="small" onclick="moveDraft(${i},-1)">上移</button><button class="small" onclick="moveDraft(${i},1)">下移</button><button class="small" onclick="state.draft.rows[${i}].status='暂不放入';saveState();render()">移出</button></td></tr>`}).join('')}</table></div>${renderPager('draft',page)}<div class="actions"><button class="primary small" onclick="state.draft.rows.push({name:'',layer:'稳',status:'可讨论'});saveState();render()">新增</button><button onclick="route('10')">进入第10步｜最终核对</button></div>`;}
function moveDraft(i,d){const j=i+d;if(j<0||j>=state.draft.rows.length)return;[state.draft.rows[i],state.draft.rows[j]]=[state.draft.rows[j],state.draft.rows[i]];saveState();render();}
function finalDraftRows(){return (state.draft.rows||[]).map((r,i)=>({...r,_idx:i})).filter(r=>!/暂不|不放入|删除|剔除/.test([r.status,r.risk,r.layer].join(' ')));}
function finalRowCheck(r){const c=findCandidateMini(r.candidateId,r.name);const school=c.schoolName||r.name||'';const group=r.groupCode||c.groupCode||'';const major=r.majorName||c.majorName||'';const majorCode=r.majorCode||c.majorCode||'';const plan=c.currentPlan||c.plan2026||r.currentPlan||'';const tuition=c.tuition||r.tuition||'';const campus=c.campus||r.campus||'';const source=c.source||r.source||'';const status=String(r.status||'');const risk=String(r.risk||'');const missing=[];if(!school)missing.push('院校');if(!group)missing.push('专业组');if(!major)missing.push('专业');if(!majorCode)missing.push('专业代码');if(!plan)missing.push('今年招生人数');const must=[];if(missing.length)must.push('补：'+missing.join('、'));if(/需官方核查|提交前查官方|待核查|官方|章程|代码|选科|体检|单科|语种|口试/.test(status+' '+risk))must.push('官方核查');if(/需本人确认|你要确认|待确认|调剂|保底|垫底|学费|校区/.test(status+' '+risk))must.push('本人确认');const soft=[];if(!tuition)soft.push('学费');if(!campus)soft.push('校区');if(!source)soft.push('来源');return {candidateId:r.candidateId||c.candidateId||'',schoolName:school,groupCode:group,majorName:major,majorCode,plan,layer:r.layer||'',risk,status,missing,must,soft};}
function finalChecks(){return finalDraftRows().map(finalRowCheck);}
function finalStatusBox(){const rows=finalChecks();if(!rows.length)return `<div class="section"><h3>最终核对状态</h3><div class="notice gold"><b>还没有可核对的草案。</b>先在第09步整理草案，再回来做提交前核对。</div></div>`;const blockers=rows.filter(r=>r.missing.length||/暂不|阻断|命中底线|不建议|高风险未处理/.test(r.status+' '+r.risk));const needOfficial=rows.filter(r=>/官方核查|待核查|章程|代码|选科|体检|单科|语种|口试/.test(r.status+' '+r.risk));let title='可以进入正式系统逐项核对';let cls='green';let reason=`第09草案共有 ${rows.length} 条，关键缺口不多。请按正式系统逐项核对，不要直接照抄网页。`;if(blockers.length){title='还不能直接提交';cls='red';reason=`草案里还有 ${blockers.length} 条关键缺口或高风险项，先处理这些，再去正式系统核对。`;}else if(needOfficial.length){title='可以核对，但要带着问题看';cls='gold';reason=`草案里有 ${needOfficial.length} 条需要官方核查。可以进入正式系统逐项看，但别急着提交。`;}return `<div class="section"><h3>最终核对状态</h3><div class="notice ${cls}"><b>${title}</b><br>${reason}</div><div class="summary-cards"><div class="metric"><span>草案项</span><b>${rows.length}</b></div><div class="metric"><span>关键缺口</span><b>${blockers.length}</b></div><div class="metric"><span>需官方核查</span><b>${needOfficial.length}</b></div><div class="metric"><span>下一步</span><b>逐项核对</b></div></div></div>`;}
function finalDraftCheckTable(){const rows=finalChecks();if(!rows.length)return '';return `<div class="section"><h3>第09草案核对表</h3><div class="notice"><b>这里只看第09步准备放进草案的候选。</b>第10步不是重审300条候选，只告诉你正式填报前还差什么。</div><div class="table-wrap"><table class="table compact-table"><tr><th>顺序</th><th>候选项</th><th>层级</th><th>还差什么</th><th>最后动作</th></tr>${rows.map((r,i)=>{const lack=[...r.missing,...(r.soft.length&&!r.missing.length?r.soft.slice(0,2):[])];let action='去官方系统逐项核对';if(r.missing.length)action='先补关键字段';else if(/官方核查|提交前查官方|待核查/.test(r.status+' '+r.risk))action='先查官方信息';else if(/本人确认|调剂|保底|垫底/.test(r.status+' '+r.risk))action='本人再确认';return `<tr><td>${i+1}</td><td><b>${esc([r.schoolName,r.groupCode,r.majorName].filter(Boolean).join(' ')||r.candidateId||'未命名')}</b></td><td>${esc(r.layer||'待确认')}</td><td>${lack.length?esc(lack.join('、')):'已较完整'}</td><td>${esc(action)}</td></tr>`}).join('')}</table></div></div>`;}

.mainRisk||'')}" placeholder="例：校区待确认" oninput="state.finalVersion.rows[${i}].mainRisk=this.value;saveState()"></td><td><select onchange="state.finalVersion.rows[${i}].confirmStatus=this.value;saveState()">${['你要确认能不能接受','提交前查官方','已核对','暂不放入'].map(x=>`<option ${r.confirmStatus===x?'selected':''}>${x}</option>`).join('')}</select></td></tr>`).join('')}</table></div>`;}

function rankScreenshotPrompt(){

  const subject=state.profile.subject||'当前科类';

  const examYear=state.profile.year||'当前年份';
  return `请识别我上传的一分一段表截图。

背景信息：
省份：${province}
考生档案年份：${examYear}
批次：${batch}
科类：${subject}
当前位次：${rank}

重要说明：
1. 请把“考生档案年份 ${examYear}”理解为今年数据。
2. 截图中其他年份的数据，都理解为往年参考数据。
3. 每一行都必须尽量填写 year。网页会根据 year 自动分到“今年数据”或“往年参考”。
4. 如果截图本身没有显示年份，但标题、页面选择项或我上传时说明了年份，请按可见信息填写；如果实在无法确定年份，就把 year 写成“待确认”，并在备注里说明。

任务：
1. 我可能会一次上传近3—5年的一分一段表截图，也可能把今年和往年截图放在一起。请根据截图上的年份、批次、科类尽量区分；实在分不清就在备注里写“年份/口径待确认”。

function taskInstruction(task){const common='你可以先充分分析，不要只机械填表；可以主动补充用户可能没想到的分析角度，也可以提出下一步需要追问的问题。开放发挥只限于解释、提醒、比较和启发，不能编造学校、专业、分数、位次、招生人数、省份规则、学费、校区或招生章程。不能说保证录取、稳录、保录。无法确认就写“待确认”或“需官方核查”。内容要尽量完整，用人话解释原因、影响和下一步，不要只给简单结论。除 JSON 键名外，所有可展示内容必须用中文，不要把 adjustAccept、priority、wantedMajors 等内部字段名直接写出来。如果你已经和用户形成了固定沟通风格，请延续当前对话风格，可以更亲切、更像陪跑解释，也可以保持用户习惯的简洁风格，但必须遵守不编造、不承诺录取、不推荐未经用户提供的学校专业、不输出稳录保录等边界。每次都要输出 pageFeedback，用短句告诉用户结果、缺什么、下一步做什么。';const map={
major_intro:`担任升学规划引导员、自我探索访谈员和专业认知顾问。用聊天方式帮助第一次了解志愿的考生和家长认识自己、了解专业，不要求返回 JSON。不要推荐具体学校。不要只局限于用户举的专业示例，要主动扩展其他可能相关的专业方向。可以主动追问、假设多种路径、比较不同方向的学习内容和适合人群。重点帮助用户发现：喜欢什么、擅长什么、不能接受什么、在意稳定还是兴趣、能否接受数学/写作/背诵/编程/实验/沟通/考证/读研等。语言要通俗、温和、能启发用户思考。最后请整理一段可回填到网页第02步的最终偏好，分成想学的专业、不能接受的专业、城市或地区偏好、学费/计划类型/调剂等底线、其他重要考虑、还不确定的问题。`,
preference_review:`请担任升学规划引导员和偏好梳理顾问。先帮助用户继续认识自己，再把用户已填写内容整理成后续可用的筛选规则。不要推荐具体学校。不要把示例专业当成范围，允许主动扩展更多专业方向，并提醒用户可能忽略的学习方式、能力要求、性格匹配、就业/考研/考公路径、城市、学费、民办/中外合作/分校区、调剂、家庭意见冲突等问题。可以指出“听起来喜欢但未必适合”的地方，但不要替用户下最终结论。问题要用中文人话表达，不要出现网页内部字段名。请输出 fields.reviewItems，每项含 type、question、reason、suggestion、status；并输出 fields.impact，每项含 item、impact，说明这个偏好后面会影响哪里；最后在 summary 或 pageFeedback.nextAction 中提醒用户把最终偏好回填到网页第02步表格，避免后续步骤引用旧信息。${common}`,
rule_extract:`请担任本省志愿规则解释员。允许你把官方原文翻译成家长和考生能看懂的话，也可以举简单例子解释，但所有规则判断必须来自用户提供的官方原文，不能凭经验补规则。不要只摘字段，要把必须明白的规则和容易踩坑的地方讲清楚：能填几个志愿、每个志愿格子是什么、平行志愿是什么意思、投档后会发生什么、调剂会到哪里、选科不符合会怎样、同分排序、投档比例、征集志愿、特殊类型/专项计划限制、哪些规则影响退档风险、哪些必须官方核对。请输出 fields.volunteerUnit、volunteerCount、filingMode、adjustRule、subjectRule、ruleExplanations。ruleExplanations 每项含 rulePoint、plain、impact、misread、check、reliability。字段值尽量使用中文短句或数字，不要输出对象；如必须输出对象，里面也要有中文解释。${common}`,
rank_clean:`请担任位次数据检查员和填表引导员。只检查位次数据是否能用于估算，不要推荐学校，不要做冲稳保分层。请分别检查 currentYearRows（今年数据）、historyRefRows（往年参考）和 yearStats（年度补充信息，如同科类总人数、批次线对应位次），并用人话告诉用户今年数据、往年参考和年度补充信息分别有什么用、哪里缺、缺了会怎样。一分一段表中“累计人数”通常可理解为该分数段最低位次；若用户只填最低位次，不要强行补最高位次。可以建议用户用夸克高考查一分一段表，按当前位次前后约1000名截图或复制往年数据，必要时扩大到1500—2000名；也可以提醒用户把截图发给自己的 AI 识别成表格。请输出 fields.cleaned、cleanNotes、missing、checkItems，并用 pageFeedback 告诉用户够不够估算、缺哪几年、能不能继续。${common}`,
rank_estimate:`请担任等效位次估算解释员。本步骤只负责估算等效位次区间和可靠程度，不推荐学校，不做冲稳保分层，不承诺录取结果。请按以下优先级处理：第一，确认今年定位：检查考生分数和位次是否落在今年一分一段对应分数段内，说明同分人数和是否需要放宽候选范围。第二，做同位次直接对照：把考生今年位次放到往年一分一段表中，找出每一年包含该位次的分数段；如果落在分数交界处，请说明“接近边界”，不要只写死一个分数。第三，计算全体排名率：如果 yearStats 提供今年同科类总人数，计算“全体排名率 = 考生位次 ÷ 今年同科类总人数”；如果往年也有同科类总人数，可以给出往年全体排名率映射位次。没提供就明确写暂不能计算，不要硬算。第四，计算批次内比例：如果 yearStats 提供今年批次线对应位次，计算“批次内比例 = 考生位次 ÷ 今年批次线对应位次”；如果往年也有批次线对应位次，可以给出往年批次内比例映射位次。没提供就明确写暂不能计算，不影响基础估算，但会降低精细度。第五，综合判断：同位次对照是主依据，排名率和批次内比例只做辅助校验，不要把三种结果机械平均；如果差距较大，要说明原因并扩大候选收集范围。必须说明数据来源、截图识别风险、新旧科类口径差异等对可靠性的影响。请输出 fields.range、centerRank、collectionRange、reliability、readyFor04B、conclusion、currentPosition、rankingRate、batchRatio、yearMappings、rateMappings、methodNotes、limits、nextUse 和 pageFeedback。${common}`,
range_generate:`请担任候选数据收集规划员。根据01基础档案、02偏好、03规则、04A等效位次，生成第05步候选数据收集清单。不要推荐具体学校。请先用人话说明为什么要这样收集、哪些范围要多收一点、哪些偏好会影响收集范围。可以根据数据可靠性和用户风险偏好灵活调整上探、重点、保底的大致位次范围，但不能编造具体院校。请输出 fields.suggested、fields.readyList、fields.fieldsToCollect、fields.importantFields、fields.fallback。包括上探、重点、保底的大致位次范围，以及要收集的字段。${common}`,
candidate_clean:`请担任候选库口径和异常抽查员。页面已经负责查缺字段，你只负责挑刺：口径是否混用、数据是否异常、是否命中偏好底线、来源是否待核查。不要补编官方数据，不做第06步位次估值，不分冲稳保，不生成草案。请注意报考年份口径：今年招生人数看考生档案年份，历史最低分/位次只能看往年。请输出 fields.issues 或 checkItems，每项尽量保留 candidateId，并含 item、type、level、reason、suggestion；summary 用一句话说明本页能否进入第06步。${common}`,
rank_analysis:`请担任位次和招生计划分析员。基于候选库、等效位次和招生人数变化，判断每个候选项的位次关系、招生人数变化、数据可靠性和是否值得继续看。不要分冲稳保。真实填报数据经常不全，不要把普通缺失都判成必须补数据；请区分 A 数据较完整、B 可继续但低可靠、C 建议回05补后判断、D 暂不继续。请先充分解释每个判断的理由，可以主动提醒专业组变化、缩招扩招、数据缺失、口径混用、近年热度变化等因素。请输出 fields.summary 和 fields.rows；rows 每项尽量保留 candidateId，并含 name、rankRelation、planChange、reliability、suggestion、nextStep；nextStep 只能是 enter07、enter07_with_risk、back05、hold、remove，其中 back05 只用于缺到无法判断的致命缺口。不要把 hasCurrentPlan、historyScoreRankCount 等内部字段原样写给用户。候选超过50条时，仍要逐条给标签，不要只输出前几条；如果分批处理，请标明 batchIndex 和 batchSize。请额外用 pageFeedback 写清楚：本步结论、用户现在要处理什么、是否可以进入第07步。${common}`,
layering:`请担任分层策略顾问。根据第06步分析、偏好和规则，初步分成冲、稳、保、垫。分层前先校准位次方向：位次数字越小=排名越靠前=更难录；往年录取位次数字小于考生位次，通常更偏冲；往年录取位次接近考生位次，才可能是稳；往年录取位次数字大于考生位次，才更偏保或垫。例：考生位次7521，历史线6500不是保，是更难；历史线9000才有保的可能。可以充分解释为什么这样分层，也可以指出结构不均衡、保底不足、候选太少、候选过度集中等问题。必须检查保底是否真的能承担保底作用，不能把数据不足或用户不接受的候选项当保底。请优先输出 fields.rows；每项尽量保留 candidateId，并含 name、layer、reason、safetyRole、planImpact。不要只输出少数示例，候选很多时也要按批逐条打标签。也可以输出 fields.冲稳保垫初步分层表，但不要只写自然语言。请额外用 pageFeedback 写清楚：分层结构是否健康、保底是否足够、用户现在要确认什么。${common}`,
risk_review:`请担任风险复核顾问。检查缩招、人数太少、新增专业、招生口径混用、调剂、校区、学费、学制、选科、章程限制、体检、语种、单科要求。可以主动补充用户可能没想到的风险，尤其是假保底、专业组内不接受专业、学费和校区、调剂范围、章程限制。风险提醒要清楚但不要吓人，不要把普通缺数据都说成“待核查”。请输出 fields.rows；每项尽量保留 candidateId，并含 item、level、type、desc、status、suggestion。status 只能从这四个里选：已记录 / 你要确认 / 提交前查官方 / 暂不放入。普通缺一年数据、来源不够细、低可靠提醒，默认写“已记录”；专业、城市、学费、调剂能不能接受，写“你要确认”；代码、章程、选科、体检、语种、单科、官方计划需要核对，写“提交前查官方”；明显踩中用户底线，写“暂不放入”。候选很多时也要逐条或分批输出，不要只写总结。请额外用 pageFeedback 写清楚：优先查看项、需要本人决定的项、提交前要查官方的项、是否可以进入第09步。${common}`,

function extractJson(txt){

  const fences=[...s.matchAll(/```(?:json)?\s*([\s\S]*?)```/gi)].map(m=>m[1].trim()).filter(Boolean);
  tries.push(...fences);
  const a=s.indexOf('{'),b=s.lastIndexOf('}');
  if(a>=0&&b>a)tries.push(s.slice(a,b+1));
  const aa=s.indexOf('['),bb=s.lastIndexOf(']');
  if(aa>=0&&bb>aa)tries.push(s.slice(aa,bb+1));
  let lastErr=null;
  for(const t of tries){
    try{
      const obj=JSON.parse(t);
      if(Array.isArray(obj))return {fields:{rows:obj}, summary:'已读取 JSON 数组。'};
      return obj;
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error('没有找到可读取的 JSON。');

  if(/候选ID|candidateId|编号/.test(raw))return 'candidateId';
  if(/志愿序号|志愿号/.test(raw))return 'volunteerNo';
  if(/院校代码|学校代码/.test(raw))return 'schoolCode';
  if(/院校名称|学校名称|院校|学校/.test(raw))return 'schoolName';
  if(/专业组代码|专业组|组号/.test(raw))return 'groupCode';
  if(/专业代码/.test(raw))return 'majorCode';
  if(/专业名称|专业$/.test(raw))return 'majorName';
  if(/招生口径|计划类型|类别/.test(raw))return 'admissionType';
  if(/今年.*招生|今年.*计划|招生人数|招生计划/.test(raw)&&!(/上一年|前二年|前三年/.test(raw))&&!hasYear(y.prev1)&&!hasYear(y.prev2)&&!hasYear(y.prev3))return 'plan2026';
  if(hasYear(y.current)&&/计划|招生人数|招生计划/.test(raw))return 'plan2026';
  if(hasYear(y.current)&&/最低|位次|分/.test(raw))return '';
  if(/上一年.*计划|上一年招生人数/.test(raw)||hasYear(y.prev1)&&/计划|招生人数|招生计划/.test(raw))return 'plan2025';
  if(/上一年.*最低|上一年.*位次/.test(raw)||hasYear(y.prev1)&&/最低|位次|分/.test(raw))return 'scoreRank2025';
  if(/前二年.*计划|前二年招生人数/.test(raw)||hasYear(y.prev2)&&/计划|招生人数|招生计划/.test(raw))return 'plan2024';
  if(/前二年.*最低|前二年.*位次/.test(raw)||hasYear(y.prev2)&&/最低|位次|分/.test(raw))return 'scoreRank2024';
  if(/前三年.*计划|前三年招生人数/.test(raw)||hasYear(y.prev3)&&/计划|招生人数|招生计划/.test(raw))return 'plan2023';
  if(/前三年.*最低|前三年.*位次/.test(raw)||hasYear(y.prev3)&&/最低|位次|分/.test(raw))return 'scoreRank2023';
  if(/选科|科目/.test(raw))return 'subjectReq';
  if(/学制/.test(raw))return 'duration';
  if(/学费|费用/.test(raw))return 'tuition';
  if(/校区|地点/.test(raw))return 'campus';
  if(/来源|出处/.test(raw))return 'source';
  if(/备注|说明|风险/.test(raw))return 'note';
  return '';
}

function parseCandidateText(text,source='粘贴表格'){const lines=String(text||'').split(/\r?\n/).map(x=>x.trim()).filter(Boolean);if(!lines.length){toast('没有可预览的内容');return;}const del=lines.some(l=>l.includes('\t'))?'\t':',';const rows=lines.map(l=>splitLine(l,del));let header=rows[0]||[],map=header.map(fieldFromHeader),start=map.some(Boolean)?1:0;if(!map.some(Boolean))map=candidateColumnsView().map(c=>c[0]);const imported=[];for(let i=start;i<rows.length;i++){const obj={};rows[i].forEach((cell,idx)=>{const k=map[idx];if(k)obj[k]=cell;});if(Object.values(obj).some(Boolean))imported.push(normalizeCandidate(obj,i));}if(!imported.length){toast('没有识别到候选项');return;}state.candidateImportPreview={rows:imported,source,mode:'replace'};saveState();render();toast(`识别到 ${imported.length} 行`);}
function parseCandidatePaste(){parseCandidateText(state.rawCandidates||'','粘贴表格');}
function renderImportPreview(){const p=state.candidateImportPreview;if(!p||!p.rows?.length)return '';return `<div class="section"><h3>导入前先看一眼</h3><div class="notice">识别到 ${p.rows.length} 行。确认没有错位，再写入候选库。</div><div class="actions"><button class="primary" onclick="confirmCandidateImport('replace')">覆盖原表</button><button onclick="confirmCandidateImport('append')">追加到后面</button><button onclick="state.candidateImportPreview=null;saveState();render()">取消</button></div><div class="table-wrap"><table class="table"><tr><th>#</th><th>院校</th><th>专业组</th><th>专业</th><th>${yearKeyLabel('plan2026')}</th><th>${yearKeyLabel('scoreRank2025')}</th><th>来源</th></tr>${p.rows.slice(0,6).map((c,i)=>`<tr><td>${i+1}</td><td>${esc(c.schoolName)}</td><td>${esc(c.groupCode)}</td><td>${esc(c.majorName)}</td><td>${esc(c.plan2026)}</td><td>${esc(c.scoreRank2025)}</td><td>${esc(c.source)}</td></tr>`).join('')}</table></div></div>`;}
function confirmCandidateImport(mode){const p=state.candidateImportPreview;if(!p)return;if(mode==='append')state.candidates=[...state.candidates,...p.rows.map(normalizeCandidate)];else state.candidates=p.rows.map(normalizeCandidate);state.candidateImportPreview=null;saveState();render();toast('已写入候选库');}
function candidateCollectionPrompt(){const r=state.rangePlan.result||{};const s=rangeSuggestedObj(r);const range=humanValue(s.firstRoundCollectionRange||s.collectionRange||'6500—9500名附近');const core=humanValue(s.coreRankRange||state.rank.estimate.range||'7300—8500名附近');const prefs=`专业偏好：${state.preferences.wantedMajors||'待确认'}；不接受：${state.preferences.rejectedMajors||'待确认'}；城市偏好：${state.preferences.cities||'待确认'}；学费：${state.preferences.tuitionLimit||'待确认'}`;return `请帮我生成“第05步候选数据收集清单”，不要推荐具体学校，不要承诺录取。\n\n背景：${state.profile.province||'待填省份'}${state.profile.year||'待填年份'}${state.profile.subject||'待填科类'}，${state.profile.batch||'待填批次'}，当前位次${state.profile.rank||'待填'}，等效位次中心约${state.rank.estimate.centerRank||'7500名'}。\n建议第一轮收集范围：${range}。重点范围：${core}。\n偏好与底线：${prefs}\n数据口径：江西本科批按院校专业组收集，不要只看学校最低位次。\n\n请告诉我：\n1. 我应该先去哪些位次范围找候选；\n2. 哪些专业、城市、学费和计划类型优先看；\n3. 哪些先不要收；\n4. 每条候选必须记录哪些字段；\n5. 如果候选太少或太多，怎么调整。\n\n输出要适合考生和家长阅读，用清单形式，不要输出代码。`;}
function importCandidateFile(){const inp=document.createElement('input');inp.type='file';/* 手机浏览器经常把 .csv 识别错；这里不限制 accept，让用户能选到 CSV/TXT/TSV，再由网页解析 */inp.onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>parseCandidateText(String(r.result||''),file.name);r.onerror=()=>alert('文件读取失败，请把表格内容复制后粘贴到输入框。');r.readAsText(file,'utf-8')};inp.click();}
function standardHeader(){return candidateColumnsView().map(c=>c[1]).join(',');}
function volunteerBookPrompt(){return `请把我提供的志愿书、截图OCR文字或候选表，整理成CSV表格。不要推荐新学校，不要改志愿顺序。看不清写“待确认”。一行一个专业。同一内容不要重复填：今年人数放今年招生人数，往年人数放对应年份。第一行必须是表头：\n${standardHeader()}\n只输出CSV，不要写解释。`;}
function downloadCandidateTemplate(){download('候选库模板.csv','\ufeff'+standardHeader()+'\n志愿1,示例大学,10403,101组,02,法学,普通类,12,15,575/5200,14,572/5400,16,568/5600,历史类,4年,5000,主校区,招生计划书,示例行','text/csv;charset=utf-8');}
function importJson(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);normalizeState();saveState();render();toast('导入成功')}catch(err){alert('导入失败')}};r.readAsText(file)};inp.click();}
function exportJson(){download('AI志愿陪跑进度.json',JSON.stringify(state,null,2),'application/json');}
function clearAiForStep(id){if(!state.ai)return;Object.keys(state.ai).forEach(k=>{if(k.startsWith(id+'_'))delete state.ai[k];});}
function currentPageName(){const p=pages.find(x=>x.id===state.current);return p?`${p.id} ${p.name}`:'当前页';}
function clearCurrentPageData(){
  const f=emptyState();
  const id=state.current;
  if(id==='01'){state.profile=f.profile;clearAiForStep('01');}
  else if(id==='02'){state.preferences=f.preferences;clearAiForStep('02');}
  else if(id==='03'){state.rules=f.rules;clearAiForStep('03');}
  else if(id==='04A'){state.rank=f.rank;clearAiForStep('04A');}
  else if(id==='04B'){state.rangePlan=f.rangePlan;clearAiForStep('04B');}
  else if(id==='05'){state.candidates=[];state.rawCandidates='';state.candidateCheck=f.candidateCheck;state.activeCandidateTab='';state.candidateImportPreview=null;clearAiForStep('05');if(state.ui)delete state.ui.candidates;}
  else if(id==='06'){state.analysis=f.analysis;clearAiForStep('06');if(state.ui)delete state.ui.analysis;}
  else if(id==='07'){state.layering=f.layering;clearAiForStep('07');if(state.ui)delete state.ui.layering;}
  else if(id==='08'){state.risks=f.risks;clearAiForStep('08');if(state.ui)delete state.ui.risks;}
  else if(id==='09'){state.draft=f.draft;clearAiForStep('09');if(state.ui)delete state.ui.draft;}
  else if(id==='10'){state.finalCheck=f.finalCheck;state.finalVersion=f.finalVersion;clearAiForStep('10');}
  saveState();render();toast('已清空本页');
}
function confirmClearCurrentPage(){
  if(state.current==='home'){toast('首页没有需要清空的表单');return;}
  if(confirm(`确定只清空【${currentPageName()}】吗？\n不会清空其他步骤。若后续结果引用了这一页，建议重新分析。`))clearCurrentPageData();
}

function confirmClear(){if(confirm('确定清空全部数据？建议先导出进度。')){state=emptyState();saveState();render();}}
function download(name,content,type){const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);}
function loadDemoData(){state=demoState();saveState();render();toast('已载入演示数据');}
function exportFinalCsv(){const rows=state.finalVersion.rows||[];const header=['最终序号','院校名称','专业组代码','专业代码','专业名称','层级','是否服从调剂','学费','校区','主要风险','最终确认状态'];const csv=[header.join(',')].concat(rows.map((r,i)=>[i+1,r.schoolName,r.groupCode,r.majorCode,r.majorName,r.layer,r.adjustObey,r.tuition,r.campus,r.mainRisk,r.confirmStatus].map(csvCell).join(','))).join('\n');download('本人最终确认版.csv','\ufeff'+csv,'text/csv;charset=utf-8');}
function csvCell(v){v=String(v??'');return /[",\n]/.test(v)?`"${v.replace(/"/g,'""')}"`:v;}
function exportReport(simple){if(simple){download('考生版报告.html',buildReportHtml(),'text/html;charset=utf-8');return;}download('完整备份报告.txt',`AI志愿陪跑工作台｜完整备份\n生成时间：${new Date().toLocaleString()}\n\n${JSON.stringify(state,null,2)}`,'text/plain');}
function buildReportHtml(){const issues=collectGlobalIssues();const rows=state.finalVersion.rows||[];return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>考生版报告</title><style>body{font-family:Microsoft YaHei,system-ui;color:#122b3b;line-height:1.7;padding:28px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #dce8ef;padding:8px;text-align:left;font-size:13px}th{background:#eef6fa}button{padding:8px 12px}
.metric.clickable{cursor:pointer;transition:.12s ease}.metric.clickable:hover{border-color:#94b9cc;box-shadow:var(--shadow2);transform:translateY(-1px)}
.howto-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:10px 0}.howto-card{background:#fff;border:1px solid var(--line);border-radius:15px;padding:12px;line-height:1.55;color:#526b7d;font-size:13px}.howto-card b{display:block;color:var(--blue);font-size:14px;margin-bottom:4px}.howto-num{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:999px;background:#eef6fa;color:#0e2b3d;font-weight:900;margin-right:5px}.mini-list{margin:8px 0 0;padding-left:18px;color:#526b7d}.mini-list li{margin:5px 0}.detail-compact{margin-top:8px;background:#fbfdfe;border:1px dashed #cbdde8;border-radius:12px;padding:8px 10px;color:#617789;font-size:12px;line-height:1.55}.filter-count{font-size:11px;color:#8aa0ad;margin-left:4px}.step-guide{background:#f7fbfd;border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0}.step-guide h3{margin:0 0 8px}.guide-row{display:grid;grid-template-columns:150px 1fr;gap:10px;padding:8px 0;border-top:1px solid #e4eef4}.guide-row:first-of-type{border-top:0}.guide-row b{color:#0e2b3d}.guide-row span{color:#526b7d;line-height:1.6}.task-card.green{background:#e2f6ec;border-color:#b6e4cd}.task-card.gold{background:#fff6df;border-color:#f2d792}.task-card.red{background:#fdecec;border-color:#efb7b7}@media(max-width:1100px){.howto-grid{grid-template-columns:1fr}.guide-row{grid-template-columns:1fr}}

.detail-tools{margin:10px 0}.detail-tools summary{cursor:pointer;color:var(--blue);font-weight:800}.detail-tools[open]{background:#f7fbfd;border:1px dashed var(--line);border-radius:16px;padding:10px}
</style></head><body><button onclick="window.print()">打印/另存为PDF</button><h1>AI志愿陪跑工作台｜考生版报告</h1><p>本报告只用于家庭讨论和填报前核对，不承诺录取。</p><h2>考生档案</h2><p>${esc(`${state.profile.province} ${state.profile.year} ${state.profile.subject} ${state.profile.score}分 位次${state.profile.rank} ${state.profile.batch}`)}</p><h2>偏好底线</h2><p>想学：${esc(state.preferences.wantedMajors)}<br>不接受：${esc(state.preferences.rejectedMajors)}<br>城市：${esc(state.preferences.cities)}</p><h2>最终确认表</h2>${htmlTable(['序号','院校','专业组','专业','层级','调剂','学费','校区','风险','状态'],rows.map((r,i)=>[i+1,r.schoolName,r.groupCode,r.majorName,r.layer,r.adjustObey,r.tuition,r.campus,r.mainRisk,r.confirmStatus]))}<h2>未处理事项</h2>${issues.length?htmlTable(['来源','等级','事项'],issues.map(x=>[x.from,x.level,x.text])):'<p>暂无明显未处理事项。</p>'}<p>正式填报仍需以省教育考试院系统、高校招生章程和当年招生计划为准。</p></body></html>`;}
function htmlTable(headers,rows){return `<table><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</table>`;}
function showGlobalIssues(){const rows=collectGlobalIssues();showModal(`<h2>待处理清单</h2>${rows.length?htmlTable(['来源','等级','事项'],rows.map(x=>[x.from,x.level,x.text])):'<div class="notice green">目前没有明显未处理事项。</div>'}`);}
function render(){document.getElementById('root').innerHTML=state.current==='home'?renderHome():`<div class="app">${renderSidebar()}${({ '01':render01,'02':render02,'03':render03,'04A':render04A,'04B':render04B,'05':render05,'06':render06,'07':render07,'08':render08,'09':render09,'10':render10 }[state.current]||render01)()}</div>`;}
try{render();}catch(e){showFatal(e);} 
</script>
